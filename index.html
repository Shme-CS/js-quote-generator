<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quote Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>Quote Generator</h1>
        <p class="description">Get inspired with random quotes</p>
        
        <!-- Quote Display Container -->
        <div class="quote-container">
            <div class="quote-icon">
                <i class="quote-mark">"</i>
            </div>
            
            <!-- Loading Spinner -->
            <div class="loading-spinner" id="loadingSpinner">
                <div class="spinner"></div>
            </div>
            
            <div class="quote-content" id="quoteContent">
                <p class="quote-text" id="quoteText">
                    Click the button below to generate an inspiring quote
                </p>
                <p class="quote-author" id="quoteAuthor">
                    - Quote Generator
                </p>
            </div>
        </div>
        
        <!-- Action Buttons -->
        <div class="button-container">
            <button class="btn btn-primary" id="newQuoteBtn">
                <span class="btn-icon">✨</span>
                New Quote
            </button>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
