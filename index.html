<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quote Generator</title>
    
    <!-- Preconnect to external resources for faster loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://api.quotable.io">
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Theme Toggle -->
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <span class="theme-icon">🌙</span>
    </button>
    
    <div class="container">
        <h1>Quote Generator</h1>
        <p class="description">Get inspired with random quotes</p>
        
        <!-- Category Filter -->
        <div class="filter-container">
            <label for="categoryFilter">Category:</label>
            <select id="categoryFilter" class="category-select">
                <option value="all">All Categories</option>
                <option value="motivation">Motivation</option>
                <option value="life">Life</option>
                <option value="success">Success</option>
                <option value="wisdom">Wisdom</option>
                <option value="inspiration">Inspiration</option>
            </select>
        </div>
        
        <!-- Quote Display Container -->
        <div class="quote-container">
            <div class="quote-icon">
                <i class="quote-mark">"</i>
            </div>
            
            <!-- Loading Spinner -->
            <div class="loading-spinner" id="loadingSpinner">
                <div class="spinner"></div>
            </div>
            
            <div class="quote-content" id="quoteContent">
                <p class="quote-text" id="quoteText">
                    Click the button below to generate an inspiring quote
                </p>
                <p class="quote-author" id="quoteAuthor">
                    - Quote Generator
                </p>
            </div>
        </div>
        
        <!-- Action Buttons -->
        <div class="button-container">
            <button class="btn btn-primary" id="newQuoteBtn">
                <span class="btn-icon">✨</span>
                New Quote
            </button>
            <button class="btn btn-secondary" id="copyBtn" title="Copy to clipboard">
                <span class="btn-icon">📋</span>
                Copy
            </button>
            <button class="btn btn-secondary" id="tweetBtn" title="Share on Twitter">
                <span class="btn-icon">🐦</span>
                Tweet
            </button>
            <button class="btn btn-favorite" id="favoriteBtn" title="Save to favorites">
                <span class="btn-icon">🤍</span>
            </button>
        </div>
        
        <!-- Favorites Section -->
        <div class="favorites-section">
            <button class="btn btn-link" id="viewFavoritesBtn">
                <span class="btn-icon">⭐</span>
                View Favorites (<span id="favoritesCount">0</span>)
            </button>
        </div>
    </div>
    
    <!-- Favorites Modal -->
    <div class="modal" id="favoritesModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Favorite Quotes</h2>
                <button class="close-btn" id="closeFavoritesBtn">&times;</button>
            </div>
            <div class="modal-body" id="favoritesList">
                <p class="no-favorites">No favorite quotes yet. Click the heart icon to save quotes!</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-danger" id="clearFavoritesBtn">Clear All</button>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
